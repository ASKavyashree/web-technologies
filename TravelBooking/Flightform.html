<!DOCTYPE html>
<html>

<head>
    <title>Travel Booking Form</title>
</head>

<body>

<form name="TravelBookingForm">

<div>
    <h1>Travel Booking Form</h1>
</div>

<hr>

<div>
    <i>Passenger Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="passengerName" required>
</div><br>

<div>
    <i>Email</i>
    <span>*</span>
    <span>:</span>
    <input type="email" name="email" required>
</div><br>

<div>
    <i>Phone Number</i>
    <span>*</span>
    <span>:</span>
    <input type="tel" name="phone" required>
</div><br>

<div>
    <i>From Location</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="fromLocation" required>
</div><br>

<div>
    <i>To Location</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="toLocation" required>
</div><br>

<div>
    <i>Travel Date</i>
    <span>*</span>
    <span>:</span>
    <input type="date" name="travelDate">
</div><br>

<div>
    <i>Travel Type</i>
    <span>*</span>
    <span>:</span>
    <select name="travelType">
        <option>Bus</option>
        <option>Train</option>
        <option>Flight</option>
    </select>
</div><br>

<div>
    <button type="submit">Submit</button>
    <button type="reset">Cancel</button>
</div>

</form>

</body>

</html>
