<!DOCTYPE html>
<html>

<head>
    <title>College Details Form</title>
</head>

<body>

<form name="CollegeForm">

<div>
    <h1>College Details Form</h1>
</div>

<hr>

<div>
    <i>Student Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="studentName" required>
</div><br>

<div>
    <i>Student ID</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="studentId" required>
</div><br>

<div>
    <i>Email</i>
    <span>*</span>
    <span>:</span>
    <input type="email" name="email" required>
</div><br>

<div>
    <i>Department</i>
    <span>*</span>
    <span>:</span>
    <select name="department">
        <option>Computer Science</option>
        <option>Information Science</option>
        <option>Electronics</option>
        <option>Mechanical</option>
    </select>
</div><br>

<div>
    <i>Course</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="course">
</div><br>

<div>
    <i>Year</i>
    <span>*</span>
    <span>:</span>
    <input type="number" name="year">
</div><br>

<div>
    <i>Address</i>
    <span>*</span>
    <span>:</span>
    <textarea name="address"></textarea>
</div><br>

<div>
    <button type="submit">Submit</button>
    <button type="reset">Cancel</button>
</div>

</form><br>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Department</th>
        <th>Semester</th>
    </tr>
    <tr>
        <td>Kavya</td>
        <td>MCA</td>
        <td>CSA</td>
        <td>4 sem</td>
    </tr>
    <tr>
        <td>Sindhu</td>
        <td>BTech</td>
        <td>CSE</td>
        <td>6 sem</td>
    </tr>
    <tr>
        <td>Anand</td>
        <td>BSC</td>
        <td>CSA</td>
        <td>2 sem</td>
    </tr>
</table>

</body>
