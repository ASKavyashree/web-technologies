<!DOCTYPE html>
<html>

<head>
    <title>Hospital Registration Form</title>
</head>

<body>

<form name="HospitalForm">

<div>
    <h1>Hospital Registration Form</h1>
</div>

<hr>

<div>
    <i>Patient Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="patientName" required>
</div><br>

<div>
    <i>Patient ID</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="patientId" required>
</div><br>

<div>
    <i>Email</i>
    <span>*</span>
    <span>:</span>
    <input type="email" name="email" required>
</div><br>

<div>
    <i>Phone Number</i>
    <span>*</span>
    <span>:</span>
    <input type="tel" name="phone" required>
</div><br>

<div>
    <i>Doctor Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="doctorName">
</div><br>

<div>
    <i>Appointment Date</i>
    <span>*</span>
    <span>:</span>
    <input type="date" name="appointmentDate">
</div><br>

<div>
    <i>Address</i>
    <span>*</span>
    <span>:</span>
    <textarea name="address"></textarea>
</div><br>

<div>
    <button type="submit">Submit</button>
    <button type="reset">Cancel</button>
</div>

</form>

</body>

</html>
