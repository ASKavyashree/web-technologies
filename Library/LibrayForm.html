<!DOCTYPE html>
<html>

<head>
    <title>Library Management Form</title>
</head>

<body>

<form name="LibraryForm">

<div>
    <h1>Library Management Form</h1>
</div>

<hr>

<div>
    <i>Student Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="studentName" required>
</div><br>

<div>
    <i>Student ID</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="studentId" required>
</div><br>

<div>
    <i>Email</i>
    <span>*</span>
    <span>:</span>
    <input type="email" name="email" required>
</div><br>

<div>
    <i>Book Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="bookName" required>
</div><br>

<div>
    <i>Author Name</i>
    <span>*</span>
    <span>:</span>
    <input type="text" name="authorName">
</div><br>

<div>
    <i>Issue Date</i>
    <span>*</span>
    <span>:</span>
    <input type="date" name="issueDate">
</div><br>

<div>
    <i>Return Date</i>
    <span>*</span>
    <span>:</span>
    <input type="date" name="returnDate">
</div><br>

<div>
    <button type="submit">Submit</button>
    <button type="reset">Cancel</button>
</div>

</form>

</body>

</html>
